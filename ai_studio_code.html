<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinhala Text To Speech - Professional Tool</title>
    <style>
        /* --- CSS Variables & Dark Mode Theme --- */
        :root {
            --primary-color: #00a8ff;
            --primary-hover: #0097e6;
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --text-color: #e0e0e0;
            --text-muted: #a0a0a0;
            --border-color: #333;
            --danger: #e84118;
            --success: #4cd137;
            --warning: #fbc531;
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- Main Container --- */
        .app-container {
            width: 100%;
            max-width: 800px;
            background-color: var(--surface-color);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* --- Notification Bar --- */
        #status-msg {
            display: none;
            background-color: rgba(232, 65, 24, 0.15);
            color: var(--danger);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid var(--danger);
            font-weight: 500;
        }

        /* --- Textarea Area --- */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 250px;
            background-color: #252525;
            color: #fff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            font-size: 1.1rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: var(--transition);
        }

        textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(0, 168, 255, 0.2);
        }

        .char-counter {
            text-align: right;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* --- Controls Grid --- */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        select, input[type="range"] {
            width: 100%;
            background: #252525;
            color: white;
            border: 1px solid var(--border-color);
            padding: 8px;
            border-radius: 6px;
            outline: none;
        }

        /* --- Buttons Styling --- */
        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }

        .utility-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: flex-end;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition);
            font-size: 0.95rem;
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-speak { background-color: var(--primary-color); color: white; }
        .btn-speak:hover { background-color: var(--primary-hover); }

        .btn-stop { background-color: var(--danger); color: white; }
        .btn-stop:hover { filter: brightness(1.2); }

        .btn-pause { background-color: var(--warning); color: #000; }
        .btn-resume { background-color: var(--success); color: white; }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }
        .btn-outline:hover {
            background-color: var(--border-color);
        }

        /* --- Responsive Tweaks --- */
        @media (max-width: 600px) {
            .app-container { padding: 20px; }
            header h1 { font-size: 1.5rem; }
            textarea { height: 200px; }
            .button-group { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Sinhala TTS</h1>
            <p>Professional Sinhala Text-to-Speech Engine</p>
        </header>

        <!-- Sinhala Voice Detection Warning -->
        <div id="status-msg">Sinhala Voice Not Available On This Device.</div>

        <div class="input-group">
            <textarea id="text-input" placeholder="මෙතැන සිංහලෙන් ලියන්න... (Write Sinhala here...)"></textarea>
            <div class="char-counter">Characters: <span id="char-count">0</span></div>
        </div>

        <div class="controls-grid">
            <!-- Voice Selector -->
            <div class="control-item">
                <label for="voice-select">Voice</label>
                <select id="voice-select">
                    <option value="">Loading Voices...</option>
                </select>
            </div>

            <!-- Volume Slider -->
            <div class="control-item">
                <label>Volume: <span id="vol-val">100</span>%</label>
                <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
            </div>

            <!-- Rate Slider -->
            <div class="control-item">
                <label>Speed (Rate): <span id="rate-val">1</span>x</label>
                <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">
            </div>

            <!-- Pitch Slider -->
            <div class="control-item">
                <label>Pitch: <span id="pitch-val">1</span></label>
                <input type="range" id="pitch" min="0" max="2" step="0.1" value="1">
            </div>
        </div>

        <!-- Main Action Buttons -->
        <div class="button-group">
            <button class="btn-speak" id="btn-speak">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M11.536 14.01A8.473 8.473 0 0 0 14.026 8a8.473 8.473 0 0 0-2.49-6.01l-.708.707A7.476 7.476 0 0 1 13.025 8c0 2.071-.84 3.946-2.197 5.303l.708.707z"/>
                    <path d="M10.121 12.596A6.48 6.48 0 0 0 12.025 8a6.48 6.48 0 0 0-1.904-4.596l-.707.707A5.483 5.483 0 0 1 11.025 8a5.483 5.483 0 0 1-1.61 3.89l.706.706z"/>
                    <path d="M8.707 11.182A4.486 4.486 0 0 0 10.025 8a4.486 4.486 0 0 0-1.318-3.182L8 5.525A3.489 3.489 0 0 1 9.025 8c0 .966-.392 1.841-1.025 2.475l.707.707z"/>
                    <path d="M7 4a.5.5 0 0 0-.812-.39L3.825 5.5H1.5A.5.5 0 0 0 1 6v4a.5.5 0 0 0 .5.5h2.325l2.363 1.89A.5.5 0 0 0 7 12V4z"/>
                </svg>
                Speak
            </button>
            <button class="btn-pause" id="btn-pause">Pause</button>
            <button class="btn-resume" id="btn-resume">Resume</button>
            <button class="btn-stop" id="btn-stop">Stop</button>
        </div>

        <!-- Extra Utility Buttons -->
        <div class="utility-buttons">
            <button class="btn-outline" id="btn-copy">Copy Text</button>
            <button class="btn-outline" id="btn-clear">Clear</button>
        </div>
    </div>

    <script>
        /**
         * SINHALA TEXT TO SPEECH ENGINE
         * Using Web Speech API (speechSynthesis)
         */

        // Element Selectors
        const textInput = document.getElementById('text-input');
        const voiceSelect = document.getElementById('voice-select');
        const volumeInput = document.getElementById('volume');
        const rateInput = document.getElementById('rate');
        const pitchInput = document.getElementById('pitch');
        const btnSpeak = document.getElementById('btn-speak');
        const btnStop = document.getElementById('btn-stop');
        const btnPause = document.getElementById('btn-pause');
        const btnResume = document.getElementById('btn-resume');
        const btnClear = document.getElementById('btn-clear');
        const btnCopy = document.getElementById('btn-copy');
        const charCountDisplay = document.getElementById('char-count');
        const statusMsg = document.getElementById('status-msg');

        // Slider Value Displays
        const volVal = document.getElementById('vol-val');
        const rateVal = document.getElementById('rate-val');
        const pitchVal = document.getElementById('pitch-val');

        // Speech Synthesis Init
        const synth = window.speechSynthesis;
        let voices = [];
        let sinhalaVoiceFound = false;

        /**
         * Populates the voice dropdown and checks for Sinhala availability
         */
        function populateVoiceList() {
            voices = synth.getVoices();
            voiceSelect.innerHTML = '';
            sinhalaVoiceFound = false;

            voices.forEach((voice, i) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.value = i;

                // Detect Sinhala (ISO codes: si, si-LK)
                if (voice.lang.toLowerCase().includes('si')) {
                    option.selected = true;
                    sinhalaVoiceFound = true;
                }

                voiceSelect.appendChild(option);
            });

            // Show warning if no Sinhala voice is detected
            if (!sinhalaVoiceFound) {
                statusMsg.style.display = 'block';
            } else {
                statusMsg.style.display = 'none';
            }
        }

        // Event for voices loading (Chrome requires this)
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        /**
         * Main Speak Function
         */
        function speak() {
            // If already speaking, cancel first to start fresh
            if (synth.speaking) {
                synth.cancel();
            }

            if (textInput.value !== '') {
                const utterance = new SpeechSynthesisUtterance(textInput.value);

                // Set selected voice
                if (voices[voiceSelect.value]) {
                    utterance.voice = voices[voiceSelect.value];
                }

                // Set properties
                utterance.volume = volumeInput.value;
                utterance.rate = rateInput.value;
                utterance.pitch = pitchInput.value;

                // Visual feedback during speech
                utterance.onstart = () => {
                    btnSpeak.style.opacity = "0.5";
                    btnSpeak.innerText = "Speaking...";
                };

                utterance.onend = () => {
                    btnSpeak.style.opacity = "1";
                    btnSpeak.innerHTML = `
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M11.536 14.01A8.473 8.473 0 0 0 14.026 8a8.473 8.473 0 0 0-2.49-6.01l-.708.707A7.476 7.476 0 0 1 13.025 8c0 2.071-.84 3.946-2.197 5.303l.708.707z"/>
                            <path d="M10.121 12.596A6.48 6.48 0 0 0 12.025 8a6.48 6.48 0 0 0-1.904-4.596l-.707.707A5.483 5.483 0 0 1 11.025 8a5.483 5.483 0 0 1-1.61 3.89l.706.706z"/>
                            <path d="M8.707 11.182A4.486 4.486 0 0 0 10.025 8a4.486 4.486 0 0 0-1.318-3.182L8 5.525A3.489 3.489 0 0 1 9.025 8c0 .966-.392 1.841-1.025 2.475l.707.707z"/>
                            <path d="M7 4a.5.5 0 0 0-.812-.39L3.825 5.5H1.5A.5.5 0 0 0 1 6v4a.5.5 0 0 0 .5.5h2.325l2.363 1.89A.5.5 0 0 0 7 12V4z"/>
                        </svg> Speak`;
                };

                synth.speak(utterance);
            }
        }

        // --- Event Listeners ---

        // Controls
        btnSpeak.addEventListener('click', speak);

        btnStop.addEventListener('click', () => {
            synth.cancel();
        });

        btnPause.addEventListener('click', () => {
            if (synth.speaking && !synth.paused) {
                synth.pause();
            }
        });

        btnResume.addEventListener('click', () => {
            if (synth.paused) {
                synth.resume();
            }
        });

        // Clear Text
        btnClear.addEventListener('click', () => {
            textInput.value = '';
            updateCharCount();
            synth.cancel();
        });

        // Copy Text to Clipboard
        btnCopy.addEventListener('click', () => {
            textInput.select();
            document.execCommand('copy');
            const originalText = btnCopy.innerText;
            btnCopy.innerText = "Copied!";
            setTimeout(() => btnCopy.innerText = originalText, 2000);
        });

        // Update Slider UI Labels
        volumeInput.addEventListener('input', () => volVal.innerText = Math.round(volumeInput.value * 100));
        rateInput.addEventListener('input', () => rateVal.innerText = rateInput.value);
        pitchInput.addEventListener('input', () => pitchVal.innerText = pitchInput.value);

        // Character Counter
        function updateCharCount() {
            charCountDisplay.innerText = textInput.value.length;
        }
        textInput.addEventListener('input', updateCharCount);

        // Run initial population
        populateVoiceList();

        // Safety: ensure synthesis stops if user closes/reloads tab
        window.onbeforeunload = () => {
            synth.cancel();
        };

    </script>
</body>
</html>
